<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MinePulse</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div id="particles-js"></div>

    <div class="background-grid"></div>

    <div class="cursor-glow"></div>

    <div class="orb orb1"></div>

    <div class="orb orb2"></div>

    <div class="container fade-in">

        <div class="hero">

            <h1>MinePulse</h1>

            <p class="tagline">
                Real-Time Minecraft Server Intelligence
            </p>

        </div>

        <div class="search-box">

            <input
                type="text"
                id="serverIP"
                placeholder="Enter Minecraft Server IP"
            >

            <button onclick="checkServerStatus()">
                Analyze Server
            </button>

        </div>

        <div class="analytics-grid">

            <div class="analytics-card">

                <h3>Total Checks</h3>

                <p id="totalChecks">0</p>

            </div>

            <div class="analytics-card">

                <h3>Favorite Servers</h3>

                <p id="favoriteCount">0</p>

            </div>

            <div class="analytics-card">

                <h3>Server Status</h3>

                <p id="pingStatus">-</p>

            </div>

            <div class="analytics-card">

                <h3>Server Software</h3>

                <p id="softwareType">-</p>

            </div>

        </div>

        <div class="monitor-section">

            <div class="card">

                <h2>
                    Multi Server Monitor
                </h2>

                <div
                    id="monitorGrid"
                    class="monitor-grid"
                >

                </div>

            </div>

        </div>

        <div class="dashboard">

            <div class="card main-card">

                <div class="top-section">

                    <img
                        id="serverIcon"
                        src="https://api.iconify.design/mdi/minecraft.svg?color=%2360a5fa"
                    >

                    <div>

                        <h2 id="status">
                            Waiting...
                        </h2>

                        <button id="copyBtn">
                            Copy IP
                        </button>

                    </div>

                </div>

                <div class="info-grid">

                    <p>
                        Players:
                        <span id="players">-</span>
                    </p>

                    <p>
                        Version:
                        <span id="version">-</span>
                    </p>

                    <p>
                        Ping:
                        <span id="ping">-</span>
                    </p>

                    <p>
                        MOTD:
                        <span id="motd">-</span>
                    </p>

                    <p>
                        Bedrock:
                        <span id="bedrock">-</span>
                    </p>

                    <p>
                        Uptime Memory:
                        <span id="uptimeMemory">
                            0 checks
                        </span>
                    </p>

                </div>

                <button id="favoriteBtn">
                    ⭐ Save Favorite
                </button>

            </div>

            <div class="side-panel">

                <div class="card small-card">

                    <h3>⭐ Favorites</h3>

                    <div id="favoritesList"></div>

                </div>

                <div class="card small-card">

                    <h3>🕒 Search History</h3>

                    <div id="historyList"></div>

                </div>

                <div class="card small-card">

                    <h3>🔥 Trending Servers</h3>

                    <div id="trendingList"></div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
