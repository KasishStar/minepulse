<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MinePulse V10</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h3>Favorites</h3>
    <ul id="favList"></ul>

    <h3>History</h3>
    <ul id="histList"></ul>

    <h3>Trending</h3>
    <ul id="trendList"></ul>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h1 style="color:#2b6fff;">🟦 MinePulse V10</h1>
    <p style="color:#7f93b3;">Minecraft Server Explorer Terminal UI</p>

    <!-- SEARCH BAR -->
    <div class="search-box">
      <input id="serverIP" placeholder="Enter server (e.g. hypixel.net)" />
      <button id="searchBtn">Search</button>
      <button id="favBtn">★</button>
      <button id="copyBtn">Copy IP</button>
    </div>

    <div id="status"></div>

    <!-- CARD -->
    <div id="card" class="hidden">

      <img id="icon" />
      <h2 id="name"></h2>

      <p id="motd"></p>
      <p id="players"></p>
      <p id="ping"></p>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
