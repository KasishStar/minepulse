<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MinePulse</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg"></div>

<div class="app">

  <h1>🟩 MinePulse v2</h1>
  <p class="sub">Advanced Minecraft Server Explorer</p>

  <!-- SEARCH -->
  <div class="searchBox">
    <input id="serverIP" placeholder="Search server (e.g. hypixel.net)" />
    <button id="searchBtn">Search</button>
    <button id="favBtn">★</button>
  </div>

  <!-- STATUS -->
  <div id="status" class="status"></div>

  <!-- AUTOCOMPLETE -->
  <div id="suggestions" class="suggestions"></div>

  <!-- SERVER CARD -->
   <button id="copyBtn" class="copy-btn">Copy IP</button>
  <div id="card" class="card hidden">
    <img id="icon" />
    <div>
      <h2 id="name"></h2>
      <p id="motd"></p>
      <p id="players"></p>
      <p id="ping"></p>
    </div>
  </div>

  <!-- PANELS -->
  <div class="grid">

    <div class="box">
      <h3>⭐ Favorites</h3>
      <ul id="favList"></ul>
    </div>

    <div class="box">
      <h3>🕘 History</h3>
      <ul id="histList"></ul>
    </div>

    <div class="box">
      <h3>🔥 Trending</h3>
      <ul id="trendList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
